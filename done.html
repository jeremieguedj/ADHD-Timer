<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Great Job!</title>
  <link rel="stylesheet" href="done.css">
</head>
<body>
  <div id="scene">
    <div id="message-top">
      <div class="main-text">Thank you for watching!</div>
      <div class="sub-text" id="sub-text">See you next time!</div>
    </div>

    <div id="bunny-stage">
      <svg id="big-bunny" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
        <!-- Left ear -->
        <ellipse cx="62" cy="45" rx="18" ry="50" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
        <ellipse cx="62" cy="45" rx="11" ry="36" fill="#ffb6c1"/>
        <!-- Right ear -->
        <ellipse cx="138" cy="45" rx="18" ry="50" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
        <ellipse cx="138" cy="45" rx="11" ry="36" fill="#ffb6c1"/>
        <!-- Body -->
        <ellipse cx="100" cy="185" rx="55" ry="65" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
        <!-- Head -->
        <circle cx="100" cy="120" r="48" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
        <!-- Eyes (happy, closed arcs) -->
        <path d="M82 112 Q88 106 94 112" fill="none" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M106 112 Q112 106 118 112" fill="none" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
        <!-- Nose -->
        <ellipse cx="100" cy="127" rx="5" ry="4" fill="#ffb6c1"/>
        <!-- Mouth (big smile) -->
        <path d="M88 134 Q100 148 112 134" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Cheeks -->
        <circle cx="68" cy="128" r="9" fill="#ffb6c1" opacity="0.4"/>
        <circle cx="132" cy="128" r="9" fill="#ffb6c1" opacity="0.4"/>
        <!-- Left arm (waving) -->
        <path d="M50 175 Q25 140 35 95" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
        <path d="M50 175 Q25 140 35 95" fill="none" stroke="#e0e0e0" stroke-width="14" stroke-linecap="round" opacity="0.3"/>
        <circle cx="35" cy="90" r="9" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
        <!-- Right arm (waving) -->
        <path d="M150 175 Q175 140 165 95" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
        <path d="M150 175 Q175 140 165 95" fill="none" stroke="#e0e0e0" stroke-width="14" stroke-linecap="round" opacity="0.3"/>
        <circle cx="165" cy="90" r="9" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
        <!-- Feet -->
        <ellipse cx="75" cy="248" rx="22" ry="12" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
        <ellipse cx="125" cy="248" rx="22" ry="12" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
      </svg>
    </div>

    <div id="stars"></div>
  </div>

  <div id="parent-section">
    <button id="parent-btn">Parent: Allow more watching (hold 3s)</button>
  </div>

  <script src="done.js"></script>
</body>
</html>
