<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Promo Small — 440x280</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 440px; height: 280px; overflow: hidden; }
body {
  background: linear-gradient(135deg, #1a1a3e 0%, #2d1b69 50%, #1a1a3e 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Subtle decorative elements */
.deco-circle {
  position: absolute;
  border-radius: 50%;
  border: 2px solid rgba(124, 77, 255, 0.15);
}

.content {
  display: flex;
  align-items: center;
  gap: 24px;
  z-index: 2;
  padding: 0 30px;
}

.text-side {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.title {
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  line-height: 1.2;
  text-shadow: 0 2px 10px rgba(124, 77, 255, 0.4);
}

.tagline {
  font-size: 13px;
  color: #ffb74d;
  font-weight: 600;
  line-height: 1.4;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(38,166,154,0.2);
  border: 1.5px solid rgba(38,166,154,0.4);
  padding: 4px 10px;
  border-radius: 6px;
  color: #26a69a;
  font-size: 11px;
  font-weight: 600;
  width: fit-content;
  margin-top: 4px;
}

.bunny-side {
  flex-shrink: 0;
}

.bunny-svg {
  filter: drop-shadow(0 6px 20px rgba(0,0,0,0.4));
}

/* Mini timer illustration */
.mini-timer {
  position: absolute;
  top: 20px;
  right: 30px;
  width: 50px;
  height: 50px;
  background: #fff;
  border-radius: 50%;
  border: 3px solid #222;
  overflow: hidden;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
}
.mini-timer svg {
  width: 100%; height: 100%;
  position: absolute; top: 0; left: 0;
}
</style>
</head>
<body>
  <!-- Decorative circles -->
  <div class="deco-circle" style="width:200px;height:200px;top:-60px;left:-40px;"></div>
  <div class="deco-circle" style="width:120px;height:120px;bottom:-30px;right:-20px;"></div>

  <div class="content">
    <div class="text-side">
      <div class="title">ADHD Netflix<br>Timer</div>
      <div class="tagline">Gentle screen time reminders<br>with a bunny friend</div>
      <div class="badge">🛡️ No data collected</div>
    </div>

    <div class="bunny-side">
      <!-- Happy bunny -->
      <svg class="bunny-svg" width="120" height="160" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
        <!-- Left ear -->
        <ellipse cx="38" cy="30" rx="12" ry="35" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
        <ellipse cx="38" cy="30" rx="7" ry="25" fill="#ffb6c1"/>
        <!-- Right ear -->
        <ellipse cx="82" cy="30" rx="12" ry="35" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
        <ellipse cx="82" cy="30" rx="7" ry="25" fill="#ffb6c1"/>
        <!-- Body -->
        <ellipse cx="60" cy="110" rx="35" ry="40" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
        <!-- Head -->
        <circle cx="60" cy="75" r="30" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
        <!-- Eyes -->
        <circle cx="48" cy="70" r="4" fill="#333"/>
        <circle cx="72" cy="70" r="4" fill="#333"/>
        <!-- Eye shine -->
        <circle cx="49.5" cy="68.5" r="1.5" fill="#fff"/>
        <circle cx="73.5" cy="68.5" r="1.5" fill="#fff"/>
        <!-- Nose -->
        <ellipse cx="60" cy="80" rx="3" ry="2.5" fill="#ffb6c1"/>
        <!-- Mouth -->
        <path d="M56 84 Q60 88 64 84" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Cheeks -->
        <circle cx="40" cy="80" r="5" fill="#ffb6c1" opacity="0.4"/>
        <circle cx="80" cy="80" r="5" fill="#ffb6c1" opacity="0.4"/>
        <!-- Left arm (raised) -->
        <path d="M28 105 Q18 88 22 70" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
        <path d="M28 105 Q18 88 22 70" fill="none" stroke="#e0e0e0" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
        <circle cx="22" cy="67" r="5" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
        <!-- Right arm (raised) -->
        <path d="M92 105 Q102 88 98 70" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
        <path d="M92 105 Q102 88 98 70" fill="none" stroke="#e0e0e0" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
        <circle cx="98" cy="67" r="5" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
        <!-- Feet -->
        <ellipse cx="45" cy="148" rx="14" ry="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
        <ellipse cx="75" cy="148" rx="14" ry="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
      </svg>
    </div>
  </div>

  <!-- Mini timer -->
  <div class="mini-timer">
    <svg viewBox="0 0 50 50">
      <path d="M 25 25 L 25 2 A 23 23 0 1 1 5.5 38 Z" fill="#7c4dff"/>
    </svg>
  </div>
</body>
</html>
