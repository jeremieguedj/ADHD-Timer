<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screenshot 3 — Done Page</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1280px; height: 800px; overflow: hidden; }
body {
  background: linear-gradient(135deg, #1a1a3e 0%, #2d1b69 40%, #1a1a3e 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: #fff;
  position: relative;
}

/* Floating stars */
.star {
  position: absolute;
  font-size: 28px;
  opacity: 0.7;
  animation: twinkle 2s ease-in-out infinite alternate;
}
@keyframes twinkle {
  from { opacity: 0.3; transform: scale(0.8); }
  to { opacity: 0.9; transform: scale(1.1); }
}

.content {
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 2;
}

.main-text {
  font-size: 64px;
  font-weight: 800;
  text-shadow: 0 4px 20px rgba(124, 77, 255, 0.5);
  margin-bottom: 12px;
}

.sub-text {
  font-size: 36px;
  font-weight: 600;
  color: #ffb74d;
  text-shadow: 0 2px 10px rgba(255, 183, 77, 0.4);
  margin-bottom: 40px;
}

.bunny-svg {
  filter: drop-shadow(0 10px 40px rgba(0,0,0,0.5));
}

/* Parent button at bottom */
.parent-btn {
  position: absolute;
  bottom: 30px;
  padding: 10px 24px;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  color: #666;
  font-size: 12px;
  font-family: inherit;
}

/* Caption bar */
.caption-bar {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 14px 36px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 3;
}
.caption-bar .caption-icon { font-size: 28px; }
.caption-bar .caption-text {
  color: #fff;
  font-size: 20px;
  font-weight: 600;
  white-space: nowrap;
}
.caption-bar .caption-sub {
  color: #aaa;
  font-size: 14px;
}
</style>
</head>
<body>
  <!-- Stars -->
  <div class="star" style="top:5%;left:8%;animation-delay:0s">⭐</div>
  <div class="star" style="top:12%;left:85%;animation-delay:0.3s">🌟</div>
  <div class="star" style="top:25%;left:15%;animation-delay:0.7s">✨</div>
  <div class="star" style="top:8%;left:50%;animation-delay:1.1s">⭐</div>
  <div class="star" style="top:30%;left:75%;animation-delay:0.5s">🌟</div>
  <div class="star" style="top:15%;left:35%;animation-delay:1.4s">✨</div>
  <div class="star" style="top:60%;left:5%;animation-delay:0.9s">⭐</div>
  <div class="star" style="top:55%;left:90%;animation-delay:1.2s">🌟</div>
  <div class="star" style="top:70%;left:20%;animation-delay:0.2s">✨</div>
  <div class="star" style="top:45%;left:92%;animation-delay:0.8s">⭐</div>
  <div class="star" style="top:75%;left:80%;animation-delay:1.6s">🌟</div>
  <div class="star" style="top:40%;left:10%;animation-delay:1.0s">✨</div>

  <div class="content">
    <div class="main-text">Thank you for watching!</div>
    <div class="sub-text">Time for outside play!</div>

    <!-- Big waving bunny -->
    <svg class="bunny-svg" width="300" height="390" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
      <!-- Left ear -->
      <ellipse cx="62" cy="45" rx="18" ry="50" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
      <ellipse cx="62" cy="45" rx="11" ry="36" fill="#ffb6c1"/>
      <!-- Right ear -->
      <ellipse cx="138" cy="45" rx="18" ry="50" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
      <ellipse cx="138" cy="45" rx="11" ry="36" fill="#ffb6c1"/>
      <!-- Body -->
      <ellipse cx="100" cy="185" rx="55" ry="65" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
      <!-- Head -->
      <circle cx="100" cy="120" r="48" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
      <!-- Eyes (happy, closed arcs) -->
      <path d="M82 112 Q88 106 94 112" fill="none" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M106 112 Q112 106 118 112" fill="none" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Nose -->
      <ellipse cx="100" cy="127" rx="5" ry="4" fill="#ffb6c1"/>
      <!-- Mouth (big smile) -->
      <path d="M88 134 Q100 148 112 134" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Cheeks -->
      <circle cx="68" cy="128" r="9" fill="#ffb6c1" opacity="0.4"/>
      <circle cx="132" cy="128" r="9" fill="#ffb6c1" opacity="0.4"/>
      <!-- Left arm (waving) -->
      <path d="M50 175 Q25 140 35 95" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
      <path d="M50 175 Q25 140 35 95" fill="none" stroke="#e0e0e0" stroke-width="14" stroke-linecap="round" opacity="0.3"/>
      <circle cx="35" cy="90" r="9" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
      <!-- Right arm (waving) -->
      <path d="M150 175 Q175 140 165 95" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
      <path d="M150 175 Q175 140 165 95" fill="none" stroke="#e0e0e0" stroke-width="14" stroke-linecap="round" opacity="0.3"/>
      <circle cx="165" cy="90" r="9" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
      <!-- Feet -->
      <ellipse cx="75" cy="248" rx="22" ry="12" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
      <ellipse cx="125" cy="248" rx="22" ry="12" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
    </svg>
  </div>

  <button class="parent-btn">Parent: Allow more watching (hold 3s)</button>

  <!-- Caption -->
  <div class="caption-bar">
    <span class="caption-icon">🎉</span>
    <div>
      <div class="caption-text">Cheerful celebration page when time is up</div>
      <div class="caption-sub">Positive reinforcement — suggests a next activity. Parent override available.</div>
    </div>
  </div>
</body>
</html>
