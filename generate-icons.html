<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.2);
  ctx.fill();

  // Bunny head
  const cx = s / 2, cy = s * 0.55, r = s * 0.28;

  // Ears
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(cx - r * 0.55, cy - r * 1.3, r * 0.25, r * 0.7, -0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + r * 0.55, cy - r * 1.3, r * 0.25, r * 0.7, 0.15, 0, Math.PI * 2);
  ctx.fill();

  // Inner ears
  ctx.fillStyle = '#ffb6c1';
  ctx.beginPath();
  ctx.ellipse(cx - r * 0.55, cy - r * 1.3, r * 0.13, r * 0.5, -0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + r * 0.55, cy - r * 1.3, r * 0.13, r * 0.5, 0.15, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  if (s >= 48) {
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(cx - r * 0.35, cy - r * 0.1, r * 0.12, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + r * 0.35, cy - r * 0.1, r * 0.12, 0, Math.PI * 2);
    ctx.fill();

    // Nose
    ctx.fillStyle = '#ffb6c1';
    ctx.beginPath();
    ctx.ellipse(cx, cy + r * 0.2, r * 0.1, r * 0.08, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

[16, 48, 128].forEach(size => {
  const canvas = document.getElementById('c' + size);
  drawIcon(canvas);
  const link = document.createElement('a');
  link.download = `icon${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.textContent = `Download ${size}x${size}`;
  document.body.appendChild(link);
  document.body.appendChild(document.createElement('br'));
});
</script>
</body>
</html>
